services:
  postgres:
    image: postgres:16-alpine
    container_name: helloworld-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-helloworld}
      POSTGRES_USER: ${POSTGRES_USER:-hwuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - helloworld-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hwuser} -d ${POSTGRES_DB:-helloworld}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: helloworld-backend
    restart: unless-stopped
    environment:
      - PORT=${PORT:-3000}
      - NODE_ENV=production
      # PostgreSQL
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-helloworld}
      - POSTGRES_USER=${POSTGRES_USER:-hwuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme_in_production}
      # Local JWT (registro/login local)
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-1h}
      # Okta
      - OKTA_ISSUER=${OKTA_ISSUER}
      - OKTA_CLIENT_ID=${OKTA_CLIENT_ID}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - helloworld-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: helloworld-frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - helloworld-net

volumes:
  postgres_data:
    driver: local

networks:
  helloworld-net:
    driver: bridge
